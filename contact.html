<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - FILMIX</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080b12; color: #f0f0f0; font-family: 'DM Sans', sans-serif; padding: 40px 20px; }
.container { max-width: 600px; margin: 0 auto; background: #0d1120; border-radius: 20px; padding: 40px; border: 1px solid #1e2535; }
h1 { color: #e50914; margin-bottom: 20px; font-size: 28px; }
p { color: #8a93a8; line-height: 1.6; margin-bottom: 15px; }
input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: #111827; border: 1px solid #1e2535; border-radius: 8px; color: white; font-family: inherit; }
input:focus, textarea:focus { border-color: #e50914; outline: none; }
button { background: #e50914; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
button:hover { background: #b20710; }
.btn-back { display: inline-block; background: transparent; border: 1px solid #e50914; color: #e50914; padding: 10px 24px; border-radius: 8px; margin-top: 20px; text-decoration: none; }
</style>
</head>
<body>
<div class="container">
<h1>📧 Contact Us</h1>
<p>Have questions or suggestions? Send us a message and we'll get back to you within 24-48 hours.</p>

<form action="#" method="post">
  <input type="text" placeholder="Your Name" required>
  <input type="email" placeholder="Your Email" required>
  <textarea rows="5" placeholder="Your Message" required></textarea>
  <button type="submit">Send Message →</button>
</form>

<p style="margin-top: 25px; text-align: center;">Or email us directly at: <strong style="color:#e50914;">contact@filmix.ma</strong></p>

<a href="index.html" class="btn-back">← Back to Home</a>
</div>
</body>
</html>
