  <title data-i18n="doc.title">DRAMA MIX — Free Streaming of Movies & Series from Around the World</title>
  <meta name="description"
    content="Regardez vos films et séries préférés en streaming HD gratuit. Action, Comédie, Thriller, Romance, Science-Fiction — Le meilleur du cinéma mondial sur DRAMA MIX." />
  <meta name="keywords" content="streaming, movies, series, films, action, comedie, thriller, drama mix, gratuit, hd, monde" />
  
  <!-- Open Graph / Social Media Preview Image -->
  <meta property="og:title" content="DRAMA MIX — Free Streaming" />
  <meta property="og:description" content="Watch free streaming of movies and series on DRAMA MIX." />
  <meta property="og:image" content="/logo.png" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="DRAMA MIX" />
  <meta name="twitter:image" content="/logo.png" />

  <!-- SEO / Schema.org -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "DRAMA MIX",
      "url": "https://dramamix.com/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://dramamix.com/?s={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>

  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap"
    rel="stylesheet">

</head>

<body>
  <div id="app">
    <!-- Sidebar Filters -->
    <aside class="sidebar">
      <div class="logo" onclick="window.location.reload()">DRAMA MIX</div>

      <nav class="side-nav">
        <div class="nav-group">
          <span class="group-label" data-i18n="nav.menu">Menu</span>
          <a href="#" class="nav-item active" data-page="home"><span><i class="fa-solid fa-house"></i></span> <span class="nav-text" data-i18n="nav.home">Home</span></a>
          <a href="#" class="nav-item" data-page="movies"><span><i class="fa-solid fa-film"></i></span> <span class="nav-text" data-i18n="nav.movies">Movies</span></a>
          <a href="#" class="nav-item" data-page="series"><span><i class="fa-solid fa-tv"></i></span> <span class="nav-text" data-i18n="nav.series">TV Shows</span></a>
          <a href="#" class="nav-item" data-page="watchlist"><span><i class="fa-solid fa-bookmark"></i></span> <span class="nav-text" data-i18n="nav.watchlist">Watchlist</span></a>
          <a href="#" class="nav-item" data-page="favorites"><span><i class="fa-solid fa-heart"></i></span> <span class="nav-text" data-i18n="nav.favorites">Favorites</span></a>
        </div>
      </nav>

      <div class="lang-selector">
        <select id="langSelect">
          <option value="en" data-i18n="lang.en">English</option>
          <option value="fr" data-i18n="lang.fr">Français</option>
          <option value="ar" data-i18n="lang.ar">العربية</option>
        </select>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-bar">
        <div class="mobile-logo" onclick="window.location.reload()">DRAMA MIX</div>
        <div class="search-container">
          <span class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
          <input type="text" id="searchInput" data-i18n-placeholder="search.placeholder" placeholder="Search a movie, series..." autocomplete="off">
          <div id="searchSuggestions" class="search-suggestions"></div>
        </div>
        <div class="user-actions">
          <button class="btn-icon" data-i18n-title="nav.notifications" title="Notifications"><i class="fa-solid fa-bell"></i></button>
          <div class="user-profile">
            <img src="/logo.png" alt="DRAMA MIX Logo">
          </div>
        </div>
      </header>

      <!-- Announcement Marquee -->
      <div id="announcement-marquee"></div>

      <!-- Pages -->
      <div id="page-content" class="content-area">
        <!-- Mobile Genre List -->
        <div id="mobile-genre-list" class="genre-list mobile-genres"></div>

        <!-- Hero Section (only on home) -->
        <div id="hero-wrapper"></div>

        <!-- Content Grid -->
        <section class="section">
          <!-- Horizontal Genre Bar -->
          <div id="genre-list" class="genre-list top-genres"></div>

          <div class="section-header">
            <h2 id="grid-title"></h2>
            <div class="grid-options">
              <select id="sortSelect">
                <option value="popularity.desc" data-i18n="sort.popularity">Popular</option>
                <option value="vote_average.desc" data-i18n="sort.topRated">Top Rated</option>
                <option value="primary_release_date.desc" data-i18n="sort.releaseDate">New Releases</option>
              </select>
              <select id="yearSelect">
                <option value="" data-i18n="filter.allYears">All Years</option>
              </select>
              <select id="ratingSelect">
                <option value="" data-i18n="filter.allRatings">All Ratings</option>
                <option value="7">7+</option>
                <option value="6">6+</option>
                <option value="5">5+</option>
                <option value="4">4+</option>
                <option value="3">3+</option>
              </select>
            </div>
          </div>
          <div id="movie-grid" class="movie-grid">
            <!-- Skeletons -->
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
          </div>
          <div id="load-more-trigger" class="load-more-trigger">
            <div class="spinner"></div>
          </div>
          <div id="pagination" class="pagination"></div>
        </section>
        <!-- Movie Detail Page (outside .section) -->
        <div id="movie-detail-page" class="detail-page" style="display:none"></div>
      </div>
    </main>

    <!-- Player Modal -->
    <div id="playerModal" class="modal-bg">
      <div class="modal">
        <button class="modal-close"><i class="fa-solid fa-xmark"></i></button>

        <div class="modal-body">
          <div class="player-wrapper">
            <div class="player-loading" id="playerLoading">
              <div class="spinner"></div>
              <span class="player-loading-text" data-i18n="player.loading">Loading player...</span>
            </div>
            <div class="player-ad-overlay" id="modalAdOverlay">
              <div class="ad-overlay-content">
                <div class="ad-play-btn"><i class="fa-solid fa-play"></i></div>
                <span class="ad-play-text"><i class="fa-solid fa-circle-play"></i> Click to Play / اضغط للتشغيل</span>
                <span class="ad-badge">HD Stream</span>
              </div>
            </div>
            <iframe id="playerFrame" src="" allow="autoplay; encrypted-media; fullscreen" allowfullscreen
              referrerpolicy="origin"></iframe>
            <!-- Mid-roll Ad Banner -->
            <div id="midRollAdBanner" class="mid-roll-ad-banner hidden">
              <button class="mid-roll-close" id="closeMidRollBtn" title="Close Ad"><i class="fa-solid fa-xmark"></i></button>
              <div class="mid-roll-content" id="midRollContent">
                <!-- Ad will be injected here, placeholder for now -->
                <a href="#" target="_blank">
                  <div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#111; color:#fff; border:1px solid #333;">Advertisement</div>
                </a>
              </div>
            </div>
            <button class="player-fullscreen-btn" id="fullscreenBtn" data-i18n-title="player.fullscreen" title="Fullscreen (F)">
              <i class="fa-solid fa-expand"></i>
            </button>
            <div class="source-bar" id="sourceBar"></div>
          </div>

          <div class="movie-details">
            <div class="details-main">
              <h2 id="detailTitle"><span class="modal-skeleton-title skeleton" style="display:inline-block"></span></h2>
              <div class="meta-tags">
                <span id="detailYear"></span>
                <span id="detailRating" class="rating-tag"></span>
                <span id="detailRuntime"></span>
                <button id="watchlistBtn" class="btn-watchlist"><i class="fa-regular fa-bookmark"></i> Add to Watchlist</button>
              </div>
              <p id="detailOverview"></p>
              
              <!-- Share Buttons -->
              <div class="share-section">
                <span data-i18n="player.shareLabel">Share with your friends:</span>
                <div class="share-buttons">
                  <button class="share-btn wa" data-platform="whatsapp">WhatsApp</button>
                  <button class="share-btn tg" data-platform="telegram">Telegram</button>
                  <button class="share-btn fb" data-platform="facebook">Facebook</button>
                </div>
              </div>

              <div class="cast-list" id="detailCast"></div>
            </div>
            <div class="related-section">
              <h3 data-i18n="player.related">Would you also like to watch?</h3>
              <div id="relatedGrid" class="related-grid"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Mobile Bottom Navigation -->
  <nav class="mobile-nav">
    <a href="#" class="nav-item active" data-page="home">
      <span class="nav-icon"><i class="fa-solid fa-house"></i></span>
      <span class="nav-text" data-i18n="nav.home">Home</span>
    </a>
    <a href="#" class="nav-item" data-page="movies">
      <span class="nav-icon"><i class="fa-solid fa-film"></i></span>
      <span class="nav-text" data-i18n="nav.movies">Movies</span>
    </a>
    <a href="#" class="nav-item" data-page="series">
      <span class="nav-icon"><i class="fa-solid fa-tv"></i></span>
      <span class="nav-text" data-i18n="nav.series">TV Shows</span>
    </a>
    <a href="#" class="nav-item" data-page="watchlist">
      <span class="nav-icon"><i class="fa-solid fa-bookmark"></i></span>
      <span class="nav-text" data-i18n="nav.watchlist">Watchlist</span>
    </a>
  </nav>

  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/src/react-entry.jsx"></script>


  
</body>
</html>
